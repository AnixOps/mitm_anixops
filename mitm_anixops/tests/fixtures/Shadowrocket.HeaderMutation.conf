[URL Rewrite]
^https:\/\/header\.shadowrocket\.test\/request-add\/(.*) header-add X-Shadowrocket-Trace trace-$1
^https:\/\/header\.shadowrocket\.test\/request-replace\/(.*) header-replace X-Shadowrocket-Mode mode-$1
^https:\/\/header\.shadowrocket\.test\/request-drop header-del X-Shadowrocket-Drop
^https:\/\/header\.shadowrocket\.test\/request-regex header-replace-regex X-Shadowrocket-Token "old=([A-Za-z]+)" "new=$1"
^https:\/\/header\.shadowrocket\.test\/response-add\/(.*) response-header-add X-Shadowrocket-Trace resp-$1
^https:\/\/header\.shadowrocket\.test\/response-replace\/(.*) response-header-replace X-Shadowrocket-Mode resp-$1
^https:\/\/header\.shadowrocket\.test\/response-drop response-header-del Set-Cookie
^https:\/\/header\.shadowrocket\.test\/response-regex response-header-replace-regex X-Shadowrocket-Mode "old=([A-Za-z]+)" "resp=$1"
