[Argument]
Mode = select,binding

[MITM]
hostname = api.binding.test

[Rewrite]
^http:\/\/old\.binding\.test\/(.*) https://api.binding.test/$1 302
^https:\/\/api\.binding\.test\/request\/(.*) header-add X-Binding trace-$1
^https:\/\/api\.binding\.test\/request-current\/(.*) header-replace-regex X-Binding-Current old-(.*) req-$1
^https:\/\/api\.binding\.test\/request\/(.*) request-body-replace-regex token=([0-9]+) token=$1-bound
^https:\/\/api\.binding\.test\/response\/(.*) response-header-add X-Binding resp-$1
^https:\/\/api\.binding\.test\/response-current\/(.*) response-header-replace-regex X-Binding-Current old-(.*) resp-$1
^https:\/\/api\.binding\.test\/response\/(.*) response-body-replace-regex ad clean

[Script]
http-request ^https:\/\/api\.binding\.test\/request\/(.*) requires-body=1, timeout-ms=333, max-size=777, script-path=https://scripts.binding.test/request.js, tag=binding.request, argument=[{Mode}]
http-response ^https:\/\/api\.binding\.test\/response\/(.*) requires-body=1, timeout-ms=444, max-size=888, script-path=https://scripts.binding.test/response.js, tag=binding.response, argument=[{Mode}]
