[Rewrite]
^https:\/\/parity\.plan\.test\/redirect\/(.*) https://new.plan.test/$1 302
^https:\/\/parity\.plan\.test\/request\/(.*) header-add X-Trace trace-$1
^https:\/\/parity\.plan\.test\/request\/(.*) header-replace X-Mode mode-$1
^https:\/\/parity\.plan\.test\/request\/(.*) request-body-replace-regex token=([0-9]+) token=$1-ok
^https:\/\/parity\.plan\.test\/response\/(.*) response-header-add X-Resp resp-$1
^https:\/\/parity\.plan\.test\/response\/(.*) response-body-replace-regex ad clean

[Script]
http-request ^https:\/\/parity\.plan\.test\/request\/(.*) requires-body=1, timeout-ms=250, max-size=1024, script-path=https://scripts.test/request.js, tag=parity.request, argument=Mode=request
http-response ^https:\/\/parity\.plan\.test\/response\/(.*) requires-body=1, timeout-ms=500, max-size=2048, script-path=https://scripts.test/response.js, tag=parity.response, argument=Mode=response
