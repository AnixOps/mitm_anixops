# Shadowrocket common config fixture for the P1 parser contract.

[URL Rewrite]
^http:\/\/old\.common\.shadowrocket\.test\/(.*) https://api.common.shadowrocket.test/$1 302
^https:\/\/ads\.common\.shadowrocket\.test reject-200

[Script]
Shadowrocket.Common.Request = type=http-request, pattern=^https:\/\/api\.common\.shadowrocket\.test\/v1, requires-body=1, timeout=2, max-size=4096, script-path=https://scripts.example/shadowrocket-common-request.js, argument=Mode=shadowrocket
Shadowrocket.Common.Response = type=http-response, pattern=^https:\/\/api\.common\.shadowrocket\.test\/v1, requires-body=0, timeout-ms=900, max_size=2048, script-path=https://scripts.example/shadowrocket-common-response.js

[MITM]
hostname = %APPEND% api.common.shadowrocket.test, ads.common.shadowrocket.test, -blocked.common.shadowrocket.test
skip-server-cert-verify = true
h2 = true
