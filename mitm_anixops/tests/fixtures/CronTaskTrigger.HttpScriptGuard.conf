[Script]
http-request ^https:\/\/cron\.task\.test\/http script-path=https://scripts.test/http.js, tag=cron.task.http.guard, requires-body=1, timeout=3, max-size=1024
cron "0 * * * *" script-path=https://scripts.test/cron.js, tag=cron.task.unsupported
Task = type=cron, cronexp="0 * * * *", script-path=https://scripts.test/task.js, tag=task.unsupported
Interval = type=interval, interval=3600, script-path=https://scripts.test/interval.js, tag=interval.unsupported
