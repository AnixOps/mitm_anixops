[Body Rewrite]
^https:\/\/jq\.advanced\.body\.mutation\.test\/predicate response-body-jq '.items[] | select(.enabled) | .name'
^https:\/\/jq\.advanced\.body\.mutation\.test\/slice response-body-jq '.items[1:3]'
^https:\/\/jq\.advanced\.body\.mutation\.test\/recursive response-body-jq '.. | objects | select(has("name")) | .name'
^https:\/\/jq\.advanced\.body\.mutation\.test\/computed response-body-jq '.items | map(.name + ":" + (.value | tostring)) | join(",")'
^https:\/\/jq\.advanced\.body\.mutation\.test\/delete response-body-jq 'del(.secret)'
^https:\/\/jq\.advanced\.body\.mutation\.test\/map response-body-jq '.items | map(.name)'
^https:\/\/jq\.advanced\.body\.mutation\.test\/entries response-body-jq 'with_entries(select(.key | startswith("keep")))'
^https:\/\/jq\.advanced\.body\.mutation\.test\/walk response-body-jq 'walk(if type == "string" then ascii_upcase else . end)'
^https:\/\/jq\.advanced\.body\.mutation\.test\/test response-body-jq '.name | test("^[A-Z]+$")'
^https:\/\/jq\.advanced\.body\.mutation\.test\/capture response-body-jq '.path | capture("(?<user>[^/]+)/(?<id>[0-9]+)")'
^https:\/\/jq\.advanced\.body\.mutation\.test\/assignment response-body-jq '.items |= map(.value + 1)'
^https:\/\/jq\.advanced\.body\.mutation\.test\/iterator response-body-jq '.items[] | .name'
