[Script]
http-request ^https:\/\/cron\.task\.test\/quoted-http script-path=https://scripts.test/quoted-http.js, tag=cron.task.quoted.http, requires-body=1
QuotedCron = type="cron", cronexp="30 7 * * *", script-path=https://scripts.test/quoted-cron.js, tag="quoted cron", pattern=^https:\/\/cron\.task\.test\/quoted-cron, requires-body=1
QuotedInterval = type='interval', interval="900", script_path=https://scripts.test/quoted-interval.js, tag='quoted interval', pattern=^https:\/\/cron\.task\.test\/quoted-interval, requires-body=1
QuotedTask = type="task", schedule="15 6 * * *", script-path=https://scripts.test/quoted-task.js, tag="quoted task", enabled=true
