[MITM]
hostname = trace.schema.test

[Rewrite]
^https:\/\/trace\.schema\.test\/redirect https://trace.schema.test/new 302
^https:\/\/trace\.schema\.test\/reject reject
^https:\/\/trace\.schema\.test\/body request-body-replace-regex token=([A-Za-z]+) token=$1-ok
^https:\/\/trace\.schema\.test\/header header-add X-Trace trace-ok

[Script]
http-request ^https:\/\/trace\.schema\.test\/header requires-body=1, timeout-ms=1000, max-size=2048, script-path=https://scripts.test/trace.js, tag=trace.request, argument=Mode=trace
