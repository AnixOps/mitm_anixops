[Rewrite]
^https:\/\/parity\.phase\.test\/request request-body-replace-regex token=([0-9]+) token=$1-ok
^https:\/\/parity\.phase\.test\/request header-add X-Req request
^https:\/\/parity\.phase\.test\/response response-body-replace-regex ad clean
^https:\/\/parity\.phase\.test\/response response-header-add X-Resp response

[Script]
http-request ^https:\/\/parity\.phase\.test\/request requires-body=1, script-path=https://scripts.test/request.js, tag=phase.request
http-response ^https:\/\/parity\.phase\.test\/response requires-body=1, script-path=https://scripts.test/response.js, tag=phase.response
