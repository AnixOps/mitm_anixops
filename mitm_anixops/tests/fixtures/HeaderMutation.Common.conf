[Header Rewrite]
^https:\/\/api\.header\.mutation\.test\/add\/(.*) header-add X-Trace trace-$1
^https:\/\/api\.header\.mutation\.test\/replace\/(.*) header-replace X-Mode mode-$1
^https:\/\/api\.header\.mutation\.test\/drop header-del X-Drop

[Remote Header Rewrite]
^https:\/\/api\.header\.mutation\.test\/response response-header-replace-regex X-Mode "old=([A-Za-z]+)" "new=$1"
^https:\/\/api\.header\.mutation\.test\/cookie response-header-del Set-Cookie
