      - uses: actions/upload-artifact@v7
        with:
          name: anixops-mitm-release-package
          path: |
            mitm_anixops/${{ steps.build_package.outputs.artifact_path }}
            mitm_anixops/${{ steps.build_package.outputs.artifact_sha256_file }}
            mitm_anixops/${{ steps.build_package.outputs.windows_artifact_path }}
            mitm_anixops/${{ steps.build_package.outputs.windows_artifact_sha256_file }}
            mitm_anixops/${{ steps.build_package.outputs.manifest_path }}
            mitm_anixops/${{ steps.build_package.outputs.manifest_sha256_file }}
            mitm_anixops/${{ steps.build_package.outputs.release_notes_path }}

  publish:
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - same-commit-ci
      - package
    if: ${{ needs.release-policy.outputs.source_mode == 'tag' }}
    permissions:
      contents: write
      actions: read
    environment: github-release-publication
    env:
      RELEASE_VERSION: ${{ needs.release-policy.outputs.version }}
      RELEASE_KIND: ${{ needs.release-policy.outputs.kind }}
      RELEASE_COMMIT: ${{ needs.release-policy.outputs.commit }}
      RELEASE_CI_GATE: ${{ needs.same-commit-ci.outputs.ci_gate }}
      PUBLISH_ELIGIBILITY_STATUS: ${{ needs.package.outputs.publish_eligibility_status }}
      RELEASE_READINESS_STATUS: ${{ needs.package.outputs.release_readiness_status }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with:
          name: anixops-mitm-release-package
          path: release-assets
      - name: Validate release assets before publication
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ "${PUBLISH_ELIGIBILITY_STATUS}" != "eligible" ]]; then
            printf 'release assets are not eligible for publication: %s\n' "${PUBLISH_ELIGIBILITY_STATUS}" >&2
            exit 1
          fi
          if [[ "${RELEASE_KIND}" == "stable" && "${RELEASE_READINESS_STATUS}" != "passed" ]]; then
            printf 'stable release readiness did not pass: %s\n' "${RELEASE_READINESS_STATUS}" >&2
            exit 1
          fi
          if [[ "${RELEASE_CI_GATE}" != "same-commit-main-build-success" ]]; then
            printf 'release CI gate did not pass: %s\n' "${RELEASE_CI_GATE}" >&2
            exit 1
          fi
          if gh release view "${RELEASE_VERSION}" >/dev/null 2>&1; then
            printf 'release already exists and public assets are immutable: %s\n' "${RELEASE_VERSION}" >&2
            exit 1
          fi

          artifact="release-assets/${{ needs.package.outputs.artifact_name }}"
          artifact_sha256="release-assets/$(basename "${{ needs.package.outputs.artifact_sha256_file }}")"
          windows_artifact="release-assets/${{ needs.package.outputs.windows_artifact_name }}"
          windows_artifact_sha256="release-assets/$(basename "${{ needs.package.outputs.windows_artifact_sha256_file }}")"
          manifest="release-assets/${{ needs.package.outputs.manifest_name }}"
          manifest_sha256="release-assets/$(basename "${{ needs.package.outputs.manifest_sha256_file }}")"
          notes="release-assets/$(basename "${{ needs.package.outputs.release_notes_path }}")"

          test -s "${artifact}"
          test -s "${artifact_sha256}"
          test -s "${windows_artifact}"
          test -s "${windows_artifact_sha256}"
          test -s "${manifest}"
          test -s "${manifest_sha256}"
          test -s "${notes}"
          sh mitm_anixops/scripts/release-sensitive-material-check.sh "${artifact}" "${windows_artifact}"
          grep -Eq "^[0-9a-f]{64}  $(basename "${artifact}")$" "${artifact_sha256}"
          grep -Eq "^[0-9a-f]{64}  $(basename "${windows_artifact}")$" "${windows_artifact_sha256}"
          grep -Eq "^[0-9a-f]{64}  $(basename "${manifest}")$" "${manifest_sha256}"
          grep -q "\"release_version\": \"${RELEASE_VERSION}\"" "${manifest}"
          grep -q "\"manifest_schema_version\": \"${{ needs.package.outputs.manifest_schema_version }}\"" "${manifest}"
          grep -q "\"artifact_digest_algorithm\": \"${{ needs.package.outputs.artifact_digest_algorithm }}\"" "${manifest}"
          grep -q "\"checksum_sidecar_format\": \"${{ needs.package.outputs.checksum_sidecar_format }}\"" "${manifest}"
          grep -q "\"release_commit\": \"${RELEASE_COMMIT}\"" "${manifest}"
          grep -q "\"source_mode\": \"${{ needs.package.outputs.source_mode }}\"" "${manifest}"
          grep -q "\"release_workflow_run_id\": \"${{ needs.package.outputs.release_workflow_run_id }}\"" "${manifest}"
          grep -q "\"release_workflow_run_url\": \"${{ needs.package.outputs.release_workflow_run_url }}\"" "${manifest}"
          grep -q "\"publication\": \"github-release-assets\"" "${manifest}"
          grep -q "\"publication_gate\": \"${{ needs.package.outputs.publication_gate }}\"" "${manifest}"
          grep -q "\"publish_eligibility_status\": \"eligible\"" "${manifest}"
          grep -q "\"release_readiness_status\": \"${RELEASE_READINESS_STATUS}\"" "${manifest}"
          grep -q "\"adapter_readiness_status\": \"${{ needs.package.outputs.adapter_readiness_status }}\"" "${manifest}"
          grep -q "\"adapter_readiness_gate\": \"${{ needs.package.outputs.adapter_readiness_gate }}\"" "${manifest}"
          grep -q "\"adapter_readiness_scope\": \"${{ needs.package.outputs.adapter_readiness_scope }}\"" "${manifest}"
          grep -q "\"adapter_readiness_production_claim\": \"${{ needs.package.outputs.adapter_readiness_production_claim }}\"" "${manifest}"
          grep -q "\"compatibility_total_count\":" "${manifest}"
          grep -q "\"artifact_count\": ${{ needs.package.outputs.artifact_count }}" "${manifest}"
          grep -q "\"artifact_platforms\": \\[\"linux-x64\", \"windows-x64\"\\]" "${manifest}"
          grep -q "\"platform\": \"linux-x64\"" "${manifest}"
          grep -q "\"platform\": \"windows-x64\"" "${manifest}"
          grep -q "Source mode:" "${notes}"
          grep -q "Publication gate:" "${notes}"
          grep -q "Release workflow run:" "${notes}"
          grep -q "Manifest schema:" "${notes}"
          grep -q "Artifact digest algorithm:" "${notes}"
          grep -q "Adapter readiness:" "${notes}"
          grep -q "Adapter readiness scope:" "${notes}"
          grep -q "Feature additions:" "${notes}"
          grep -q "BUG fixes:" "${notes}"
          grep -q "Compatibility matrix status counts:" "${notes}"
          grep -q "Release artifacts:" "${notes}"
          grep -q "Artifact count:" "${notes}"
          grep -q "Rollback path:" "${notes}"

      - name: Publish GitHub Release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          notes="release-assets/$(basename "${{ needs.package.outputs.release_notes_path }}")"
          prerelease_args=()
          if [[ "${RELEASE_KIND}" != "stable" ]]; then
            prerelease_args=(--prerelease)
          fi

          gh release create "${RELEASE_VERSION}" \
            release-assets/* \
            --target "${RELEASE_COMMIT}" \
            --title "mitm_anixops ${RELEASE_VERSION}" \
            --notes-file "${notes}" \
            "${prerelease_args[@]}"

      - name: Verify published release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mkdir -p release-publication-evidence
          verify_output="release-publication-evidence/release-publication-verify.env"
          for attempt in 1 2 3 4 5; do
            if sh mitm_anixops/scripts/release-publication-verify.sh \
              "${RELEASE_VERSION}" \
              "${RELEASE_COMMIT}" \
              "${{ needs.package.outputs.release_workflow_run_id }}" \
              "${{ needs.same-commit-ci.outputs.ci_run_id }}" > "${verify_output}"; then
              cat "${verify_output}"
              break
            fi
            status=$?
            if [[ "${attempt}" == "5" ]]; then
              cat "${verify_output}" || true
              exit "${status}"
            fi
            sleep 5
          done

          grep -Fx "release_publication_verify_status=passed" "${verify_output}"
          grep -Fx "release_version=${RELEASE_VERSION}" "${verify_output}"
          grep -Fx "target_commit=${RELEASE_COMMIT}" "${verify_output}"
          grep -Fx "release_workflow_run_id=${{ needs.package.outputs.release_workflow_run_id }}" "${verify_output}"
          grep -Fx "ci_run_id=${{ needs.same-commit-ci.outputs.ci_run_id }}" "${verify_output}"
          grep -Fx "artifact_platforms=linux-x64,windows-x64" "${verify_output}"

      - name: Write release publication summary
        shell: bash
        run: |
          {
            printf '## GitHub Release Publication\n\n'
            printf '| Field | Value |\n'
            printf '| --- | --- |\n'
            printf '| release_version | `%s` |\n' "${RELEASE_VERSION}"
            printf '| release_commit | `%s` |\n' "${RELEASE_COMMIT}"
            printf '| release_kind | `%s` |\n' "${RELEASE_KIND}"
            printf '| manifest_schema_version | `%s` |\n' "${{ needs.package.outputs.manifest_schema_version }}"
            printf '| artifact_digest_algorithm | `%s` |\n' "${{ needs.package.outputs.artifact_digest_algorithm }}"
            printf '| checksum_sidecar_format | `%s` |\n' "${{ needs.package.outputs.checksum_sidecar_format }}"
            printf '| source_mode | `%s` |\n' "${{ needs.package.outputs.source_mode }}"
            printf '| release_workflow_run_id | `%s` |\n' "${{ needs.package.outputs.release_workflow_run_id }}"
            printf '| release_workflow_run_url | `%s` |\n' "${{ needs.package.outputs.release_workflow_run_url }}"
            printf '| publication_gate | `%s` |\n' "${{ needs.package.outputs.publication_gate }}"
            printf '| ci_gate | `%s` |\n' "${RELEASE_CI_GATE}"
            printf '| publish_eligibility_status | `%s` |\n' "${PUBLISH_ELIGIBILITY_STATUS}"
            printf '| artifact_count | `%s` |\n' "${{ needs.package.outputs.artifact_count }}"
            printf '| artifact_platforms | `%s` |\n' "${{ needs.package.outputs.artifact_platforms }}"
            printf '| windows_artifact_name | `%s` |\n' "${{ needs.package.outputs.windows_artifact_name }}"
            printf '| adapter_readiness_status | `%s` |\n' "${{ needs.package.outputs.adapter_readiness_status }}"
            printf '| adapter_readiness_gate | `%s` |\n' "${{ needs.package.outputs.adapter_readiness_gate }}"
            printf '| adapter_readiness_scope | `%s` |\n' "${{ needs.package.outputs.adapter_readiness_scope }}"
            printf '| adapter_readiness_production_claim | `%s` |\n' "${{ needs.package.outputs.adapter_readiness_production_claim }}"
            printf '| compatibility_supported_count | `%s` |\n' "${{ needs.package.outputs.compatibility_supported_count }}"
            printf '| compatibility_partial_count | `%s` |\n' "${{ needs.package.outputs.compatibility_partial_count }}"
            printf '| compatibility_planned_count | `%s` |\n' "${{ needs.package.outputs.compatibility_planned_count }}"
            printf '| compatibility_unsupported_count | `%s` |\n' "${{ needs.package.outputs.compatibility_unsupported_count }}"
            printf '| compatibility_total_count | `%s` |\n' "${{ needs.package.outputs.compatibility_total_count }}"
            printf '| release_url | `%s/%s/releases/tag/%s` |\n' "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${RELEASE_VERSION}"
            printf '| publication_verify_artifact | `anixops-mitm-release-publication-evidence` |\n'
            printf '| publication_verify_output | `release-publication-verify.env` |\n'
          } >> "${GITHUB_STEP_SUMMARY}"

      - uses: actions/upload-artifact@v7
        with:
          name: anixops-mitm-release-publication-evidence
          path: release-publication-evidence/release-publication-verify.env
