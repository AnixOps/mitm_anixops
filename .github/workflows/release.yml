name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release workflow validation version.
        required: true
        default: v0.45.10-alpha.1

permissions:
  contents: read
  actions: read

jobs:
  release-policy:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.policy.outputs.version }}
      kind: ${{ steps.policy.outputs.kind }}
      commit: ${{ steps.policy.outputs.commit }}
      source_mode: ${{ steps.policy.outputs.source_mode }}
      publication: ${{ steps.policy.outputs.publication }}
      publication_gate: ${{ steps.policy.outputs.publication_gate }}
    steps:
      - uses: actions/checkout@v7
      - name: Validate rollback policy
        shell: bash
        run: |
          set -euo pipefail
          policy="mitm_anixops/docs/architecture/release-rollback-policy.md"
          test -s "${policy}"
          grep -q "release-rollback-policy-status=accepted" "${policy}"
          grep -q "release-replacement-policy=immutable-public-tags-and-assets" "${policy}"
          grep -q "release-workflow-publication-status=tag-publish-enabled-after-gates" "${policy}"
      - name: Validate release policy
        id: policy
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION}"
          source_mode="manual-main"

          if [[ "${EVENT_NAME}" == "push" ]]; then
            if [[ "${REF_TYPE}" != "tag" || "${REF_NAME}" != v* ]]; then
              printf 'release push must be a v* tag\n' >&2
              exit 1
            fi
            version="${REF_NAME}"
            source_mode="tag"
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${REF}" != "refs/heads/main" ]]; then
              printf 'manual release workflow validation must run from main\n' >&2
              exit 1
            fi
          else
            printf 'unsupported release event: %s\n' "${EVENT_NAME}" >&2
            exit 1
          fi

          if [[ -z "${version}" ]]; then
            printf 'release version is required\n' >&2
            exit 1
          fi

          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)(\.[0-9]+)?)?$ ]]; then
            printf 'invalid release version: %s\n' "${version}" >&2
            exit 1
          fi

          kind="stable"
          case "${version}" in
            *-alpha*) kind="alpha" ;;
            *-beta*) kind="beta" ;;
            *-rc*) kind="rc" ;;
          esac

          {
            printf 'version=%s\n' "${version}"
            printf 'kind=%s\n' "${kind}"
            printf 'commit=%s\n' "${GITHUB_SHA}"
            printf 'source_mode=%s\n' "${source_mode}"
            if [[ "${source_mode}" == "tag" ]]; then
              printf 'publication=github-release-assets\n'
              printf 'publication_gate=same-commit-ci-release-metadata-and-github-release-publication-environment\n'
            else
              printf 'publication=blocked\n'
              printf 'publication_gate=manual-validation-does-not-publish\n'
            fi
          } >> "${GITHUB_OUTPUT}"

  same-commit-ci:
    runs-on: ubuntu-latest
    needs:
      - release-policy
    outputs:
      ci_gate: ${{ steps.lookup.outputs.ci_gate }}
      ci_run_id: ${{ steps.lookup.outputs.ci_run_id }}
      ci_run_url: ${{ steps.lookup.outputs.ci_run_url }}
      ci_run_conclusion: ${{ steps.lookup.outputs.ci_run_conclusion }}
    steps:
      - name: Verify same-commit main CI
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.release-policy.outputs.commit }}
        run: |
          set -euo pipefail

          ci_record="$(
            gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/workflows/build.yml/runs" \
              -f "head_sha=${RELEASE_COMMIT}" \
              -f status=success \
              -f per_page=50 \
              --jq '.workflow_runs | map(select(.head_branch == "main" and .conclusion == "success")) | first | if . == null then "" else [.id, .html_url, .conclusion] | @tsv end'
          )"

          if [[ -z "${ci_record}" ]]; then
            printf 'missing successful same-commit main build workflow for %s\n' "${RELEASE_COMMIT}" >&2
            exit 1
          fi

          IFS=$'\t' read -r ci_run_id ci_run_url ci_run_conclusion <<< "${ci_record}"

          {
            printf 'ci_gate=same-commit-main-build-success\n'
            printf 'ci_run_id=%s\n' "${ci_run_id}"
            printf 'ci_run_url=%s\n' "${ci_run_url}"
            printf 'ci_run_conclusion=%s\n' "${ci_run_conclusion}"
          } >> "${GITHUB_OUTPUT}"

  package:
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - same-commit-ci
    outputs:
      artifact_name: ${{ steps.build_package.outputs.artifact_name }}
      artifact_path: ${{ steps.build_package.outputs.artifact_path }}
      artifact_sha256_file: ${{ steps.build_package.outputs.artifact_sha256_file }}
      manifest_name: ${{ steps.build_package.outputs.manifest_name }}
      manifest_path: ${{ steps.build_package.outputs.manifest_path }}
      manifest_sha256_file: ${{ steps.build_package.outputs.manifest_sha256_file }}
      release_notes_path: ${{ steps.build_package.outputs.release_notes_path }}
      publish_eligibility_status: ${{ steps.build_package.outputs.publish_eligibility_status }}
    defaults:
      run:
        working-directory: mitm_anixops
    env:
      RELEASE_VERSION: ${{ needs.release-policy.outputs.version }}
      RELEASE_KIND: ${{ needs.release-policy.outputs.kind }}
      RELEASE_COMMIT: ${{ needs.release-policy.outputs.commit }}
      RELEASE_SOURCE_MODE: ${{ needs.release-policy.outputs.source_mode }}
      RELEASE_PUBLICATION: ${{ needs.release-policy.outputs.publication }}
      RELEASE_PUBLICATION_GATE: ${{ needs.release-policy.outputs.publication_gate }}
      RELEASE_CI_GATE: ${{ needs.same-commit-ci.outputs.ci_gate }}
      RELEASE_CI_RUN_ID: ${{ needs.same-commit-ci.outputs.ci_run_id }}
      RELEASE_CI_RUN_URL: ${{ needs.same-commit-ci.outputs.ci_run_url }}
      RELEASE_CI_RUN_CONCLUSION: ${{ needs.same-commit-ci.outputs.ci_run_conclusion }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libpcre2-dev libjq-dev
      - name: Run release build gate
        run: |
          sh scripts/ensure-mihomo.sh
          sh scripts/check.sh
      - name: Build release artifact
        id: build_package
        shell: bash
        run: |
          set -euo pipefail

          version_no_v="${RELEASE_VERSION#v}"
          package_name="anixops-mitm-release-${version_no_v}"
          make "ALPHA_NAME=${package_name}" alpha-dist

          artifact_path="build/${package_name}.tar.gz"
          artifact_name="$(basename "${artifact_path}")"
          test -s "${artifact_path}"

          artifact_sha256="$(sha256sum "${artifact_path}" | awk '{print $1}')"
          artifact_sha256_file="build/${artifact_name}.sha256"
          printf '%s  %s\n' "${artifact_sha256}" "${artifact_name}" > "${artifact_sha256_file}"
          publish_eligibility_status="blocked"
          publish_blocking_reason="manual-release-validation-does-not-publish"
          if [[ "${RELEASE_SOURCE_MODE}" == "tag" ]]; then
            publish_eligibility_status="eligible"
            publish_blocking_reason="same-commit-ci-and-release-metadata-gates-passed"
          fi

          manifest_name="anixops-mitm-release-${version_no_v}-manifest.json"
          manifest_path="build/${manifest_name}"
          {
            printf '{\n'
            printf '  "release_version": "%s",\n' "${RELEASE_VERSION}"
            printf '  "release_kind": "%s",\n' "${RELEASE_KIND}"
            printf '  "release_commit": "%s",\n' "${RELEASE_COMMIT}"
            printf '  "source_mode": "%s",\n' "${RELEASE_SOURCE_MODE}"
            printf '  "ci_gate": "%s",\n' "${RELEASE_CI_GATE}"
            printf '  "ci_run_id": "%s",\n' "${RELEASE_CI_RUN_ID}"
            printf '  "ci_run_url": "%s",\n' "${RELEASE_CI_RUN_URL}"
            printf '  "ci_run_conclusion": "%s",\n' "${RELEASE_CI_RUN_CONCLUSION}"
            printf '  "publication": "%s",\n' "${RELEASE_PUBLICATION}"
            printf '  "publication_gate": "%s",\n' "${RELEASE_PUBLICATION_GATE}"
            printf '  "publish_eligibility_status": "%s",\n' "${publish_eligibility_status}"
            printf '  "compatibility_scope": "alpha policy-core release artifact",\n'
            printf '  "artifacts": [\n'
            printf '    {\n'
            printf '      "name": "%s",\n' "${artifact_name}"
            printf '      "path": "%s",\n' "${artifact_path}"
            printf '      "sha256": "%s",\n' "${artifact_sha256}"
            printf '      "sha256_file": "%s"\n' "$(basename "${artifact_sha256_file}")"
            printf '    }\n'
            printf '  ]\n'
            printf '}\n'
          } > "${manifest_path}"

          manifest_sha256="$(sha256sum "${manifest_path}" | awk '{print $1}')"
          manifest_sha256_file="build/${manifest_name}.sha256"
          printf '%s  %s\n' "${manifest_sha256}" "${manifest_name}" > "${manifest_sha256_file}"

          release_notes_path="build/release-notes.md"
          {
            printf '# mitm_anixops %s Release Artifact\n\n' "${RELEASE_VERSION}"
            printf 'Commit: %s\n\n' "${RELEASE_COMMIT}"
            printf 'Source mode: %s\n\n' "${RELEASE_SOURCE_MODE}"
            printf 'CI gate: %s.\n\n' "${RELEASE_CI_GATE}"
            printf 'CI run: %s\n\n' "${RELEASE_CI_RUN_URL}"
            printf 'Publication: %s.\n\n' "${RELEASE_PUBLICATION}"
            printf 'Publication gate: %s.\n\n' "${RELEASE_PUBLICATION_GATE}"
            if [[ "${RELEASE_KIND}" == "stable" ]]; then
              printf 'Compatibility scope: v1 policy core, runner, bindings, and docs as documented in the compatibility matrix.\n\n'
              printf 'Known gaps: planned and partial matrix rows remain limited by their source contracts; no signing/notarization, no platform certificate lifecycle, no production embedded JavaScript runtime, and no platform app-store release assets.\n\n'
            else
              printf 'Compatibility scope: prerelease policy core, runner, bindings, and docs.\n\n'
              printf 'Known gaps: no v1.0.0 stable release claim, no signing/notarization, no platform certificate lifecycle, no production embedded JavaScript runtime, and no platform app-store release assets.\n\n'
            fi
            printf 'Rollback path: delete the untrusted workflow artifact and create a new\n'
            printf 'tag only after the release gate passes on the replacement commit. Public\n'
            printf 'tags and release assets are immutable by default; use a successor tag for\n'
            printf 'corrected public artifacts.\n'
          } > "${release_notes_path}"

          {
            printf 'release_version=%s\n' "${RELEASE_VERSION}"
            printf 'release_kind=%s\n' "${RELEASE_KIND}"
            printf 'release_commit=%s\n' "${RELEASE_COMMIT}"
            printf 'source_mode=%s\n' "${RELEASE_SOURCE_MODE}"
            printf 'ci_gate=%s\n' "${RELEASE_CI_GATE}"
            printf 'ci_run_id=%s\n' "${RELEASE_CI_RUN_ID}"
            printf 'ci_run_url=%s\n' "${RELEASE_CI_RUN_URL}"
            printf 'ci_run_conclusion=%s\n' "${RELEASE_CI_RUN_CONCLUSION}"
            printf 'artifact_name=%s\n' "${artifact_name}"
            printf 'artifact_path=%s\n' "${artifact_path}"
            printf 'artifact_sha256=%s\n' "${artifact_sha256}"
            printf 'artifact_sha256_file=%s\n' "${artifact_sha256_file}"
            printf 'manifest_name=%s\n' "${manifest_name}"
            printf 'manifest_path=%s\n' "${manifest_path}"
            printf 'manifest_sha256=%s\n' "${manifest_sha256}"
            printf 'manifest_sha256_file=%s\n' "${manifest_sha256_file}"
            printf 'release_notes_path=%s\n' "${release_notes_path}"
            printf 'publication=%s\n' "${RELEASE_PUBLICATION}"
            printf 'publication_gate=%s\n' "${RELEASE_PUBLICATION_GATE}"
            printf 'publish_eligibility_status=%s\n' "${publish_eligibility_status}"
            printf 'publish_blocking_reason=%s\n' "${publish_blocking_reason}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          test -s "${{ steps.build_package.outputs.artifact_path }}"
          test -s "${{ steps.build_package.outputs.artifact_sha256_file }}"
          test -s "${{ steps.build_package.outputs.manifest_path }}"
          test -s "${{ steps.build_package.outputs.manifest_sha256_file }}"
          test -s "${{ steps.build_package.outputs.release_notes_path }}"
          grep -Eq "^[0-9a-f]{64}  ${{ steps.build_package.outputs.artifact_name }}$" "${{ steps.build_package.outputs.artifact_sha256_file }}"
          grep -Eq "^[0-9a-f]{64}  ${{ steps.build_package.outputs.manifest_name }}$" "${{ steps.build_package.outputs.manifest_sha256_file }}"
          grep -q "\"release_version\": \"${RELEASE_VERSION}\"" "${{ steps.build_package.outputs.manifest_path }}"
          grep -q "\"release_commit\": \"${RELEASE_COMMIT}\"" "${{ steps.build_package.outputs.manifest_path }}"
          grep -q "\"ci_gate\": \"same-commit-main-build-success\"" "${{ steps.build_package.outputs.manifest_path }}"
          grep -q "\"publication\": \"${RELEASE_PUBLICATION}\"" "${{ steps.build_package.outputs.manifest_path }}"
          grep -q "\"publish_eligibility_status\": \"${{ steps.build_package.outputs.publish_eligibility_status }}\"" "${{ steps.build_package.outputs.manifest_path }}"
          grep -q "CI gate:" "${{ steps.build_package.outputs.release_notes_path }}"
          grep -q "Compatibility scope:" "${{ steps.build_package.outputs.release_notes_path }}"
          grep -q "Known gaps:" "${{ steps.build_package.outputs.release_notes_path }}"
          grep -q "Rollback path:" "${{ steps.build_package.outputs.release_notes_path }}"

      - name: Write release build summary
        shell: bash
        run: |
          {
            printf '## Release Workflow Build\n\n'
            printf '| Field | Value |\n'
            printf '| --- | --- |\n'
            printf '| release_version | `%s` |\n' "${{ steps.build_package.outputs.release_version }}"
            printf '| release_kind | `%s` |\n' "${{ steps.build_package.outputs.release_kind }}"
            printf '| release_commit | `%s` |\n' "${{ steps.build_package.outputs.release_commit }}"
            printf '| source_mode | `%s` |\n' "${{ steps.build_package.outputs.source_mode }}"
            printf '| ci_gate | `%s` |\n' "${{ steps.build_package.outputs.ci_gate }}"
            printf '| ci_run_id | `%s` |\n' "${{ steps.build_package.outputs.ci_run_id }}"
            printf '| ci_run_conclusion | `%s` |\n' "${{ steps.build_package.outputs.ci_run_conclusion }}"
            printf '| artifact_name | `%s` |\n' "${{ steps.build_package.outputs.artifact_name }}"
            printf '| artifact_sha256 | `%s` |\n' "${{ steps.build_package.outputs.artifact_sha256 }}"
            printf '| manifest_name | `%s` |\n' "${{ steps.build_package.outputs.manifest_name }}"
            printf '| manifest_sha256 | `%s` |\n' "${{ steps.build_package.outputs.manifest_sha256 }}"
            printf '| release_notes_path | `%s` |\n' "${{ steps.build_package.outputs.release_notes_path }}"
            printf '| publication | `%s` |\n' "${{ steps.build_package.outputs.publication }}"
            printf '| publication_gate | `%s` |\n' "${{ steps.build_package.outputs.publication_gate }}"
            printf '| publish_eligibility_status | `%s` |\n' "${{ steps.build_package.outputs.publish_eligibility_status }}"
            printf '| publish_blocking_reason | `%s` |\n' "${{ steps.build_package.outputs.publish_blocking_reason }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - uses: actions/upload-artifact@v7
        with:
          name: anixops-mitm-release-package
          path: |
            mitm_anixops/${{ steps.build_package.outputs.artifact_path }}
            mitm_anixops/${{ steps.build_package.outputs.artifact_sha256_file }}
            mitm_anixops/${{ steps.build_package.outputs.manifest_path }}
            mitm_anixops/${{ steps.build_package.outputs.manifest_sha256_file }}
            mitm_anixops/${{ steps.build_package.outputs.release_notes_path }}

  publish:
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - same-commit-ci
      - package
    if: ${{ needs.release-policy.outputs.source_mode == 'tag' }}
    permissions:
      contents: write
      actions: read
    environment: github-release-publication
    env:
      RELEASE_VERSION: ${{ needs.release-policy.outputs.version }}
      RELEASE_KIND: ${{ needs.release-policy.outputs.kind }}
      RELEASE_COMMIT: ${{ needs.release-policy.outputs.commit }}
      RELEASE_CI_GATE: ${{ needs.same-commit-ci.outputs.ci_gate }}
      PUBLISH_ELIGIBILITY_STATUS: ${{ needs.package.outputs.publish_eligibility_status }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: anixops-mitm-release-package
          path: release-assets
      - name: Validate release assets before publication
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${PUBLISH_ELIGIBILITY_STATUS}" != "eligible" ]]; then
            printf 'release assets are not eligible for publication: %s\n' "${PUBLISH_ELIGIBILITY_STATUS}" >&2
            exit 1
          fi
          if [[ "${RELEASE_CI_GATE}" != "same-commit-main-build-success" ]]; then
            printf 'release CI gate did not pass: %s\n' "${RELEASE_CI_GATE}" >&2
            exit 1
          fi
          if gh release view "${RELEASE_VERSION}" >/dev/null 2>&1; then
            printf 'release already exists and public assets are immutable: %s\n' "${RELEASE_VERSION}" >&2
            exit 1
          fi

          artifact="release-assets/${{ needs.package.outputs.artifact_name }}"
          artifact_sha256="release-assets/$(basename "${{ needs.package.outputs.artifact_sha256_file }}")"
          manifest="release-assets/${{ needs.package.outputs.manifest_name }}"
          manifest_sha256="release-assets/$(basename "${{ needs.package.outputs.manifest_sha256_file }}")"
          notes="release-assets/$(basename "${{ needs.package.outputs.release_notes_path }}")"

          test -s "${artifact}"
          test -s "${artifact_sha256}"
          test -s "${manifest}"
          test -s "${manifest_sha256}"
          test -s "${notes}"
          grep -Eq "^[0-9a-f]{64}  $(basename "${artifact}")$" "${artifact_sha256}"
          grep -Eq "^[0-9a-f]{64}  $(basename "${manifest}")$" "${manifest_sha256}"
          grep -q "\"release_version\": \"${RELEASE_VERSION}\"" "${manifest}"
          grep -q "\"release_commit\": \"${RELEASE_COMMIT}\"" "${manifest}"
          grep -q "\"publication\": \"github-release-assets\"" "${manifest}"
          grep -q "\"publish_eligibility_status\": \"eligible\"" "${manifest}"
          grep -q "Rollback path:" "${notes}"

      - name: Publish GitHub Release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          notes="release-assets/$(basename "${{ needs.package.outputs.release_notes_path }}")"
          prerelease_args=()
          if [[ "${RELEASE_KIND}" != "stable" ]]; then
            prerelease_args=(--prerelease)
          fi

          gh release create "${RELEASE_VERSION}" \
            release-assets/* \
            --target "${RELEASE_COMMIT}" \
            --title "mitm_anixops ${RELEASE_VERSION}" \
            --notes-file "${notes}" \
            "${prerelease_args[@]}"

      - name: Write release publication summary
        shell: bash
        run: |
          {
            printf '## GitHub Release Publication\n\n'
            printf '| Field | Value |\n'
            printf '| --- | --- |\n'
            printf '| release_version | `%s` |\n' "${RELEASE_VERSION}"
            printf '| release_commit | `%s` |\n' "${RELEASE_COMMIT}"
            printf '| release_kind | `%s` |\n' "${RELEASE_KIND}"
            printf '| ci_gate | `%s` |\n' "${RELEASE_CI_GATE}"
            printf '| publish_eligibility_status | `%s` |\n' "${PUBLISH_ELIGIBILITY_STATUS}"
            printf '| release_url | `%s/%s/releases/tag/%s` |\n' "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${RELEASE_VERSION}"
          } >> "${GITHUB_STEP_SUMMARY}"
