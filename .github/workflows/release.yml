            printf '| release_readiness_blocking_reason | `%s` |\n' "${{ steps.build_package.outputs.release_readiness_blocking_reason }}"
            printf '| adapter_readiness_status | `%s` |\n' "${{ steps.build_package.outputs.adapter_readiness_status }}"
            printf '| adapter_readiness_gate | `%s` |\n' "${{ steps.build_package.outputs.adapter_readiness_gate }}"
            printf '| adapter_readiness_scope | `%s` |\n' "${{ steps.build_package.outputs.adapter_readiness_scope }}"
