name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release workflow validation version.
        required: true
        default: v0.45.10-alpha.1

permissions:
  contents: read
  actions: read

jobs:
  release-policy:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.policy.outputs.version }}
      kind: ${{ steps.policy.outputs.kind }}
      commit: ${{ steps.policy.outputs.commit }}
      source_mode: ${{ steps.policy.outputs.source_mode }}
      publication: ${{ steps.policy.outputs.publication }}
      publication_gate: ${{ steps.policy.outputs.publication_gate }}
    steps:
      - uses: actions/checkout@v7
      - name: Validate rollback policy
        shell: bash
        run: |
          set -euo pipefail
          policy="mitm_anixops/docs/architecture/release-rollback-policy.md"
          test -s "${policy}"
          grep -q "release-rollback-policy-status=accepted" "${policy}"
          grep -q "release-replacement-policy=immutable-public-tags-and-assets" "${policy}"
          grep -q "release-workflow-publication-status=tag-publish-enabled-after-gates" "${policy}"
      - name: Validate release policy
        id: policy
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION}"
          source_mode="manual-main"

          if [[ "${EVENT_NAME}" == "push" ]]; then
            if [[ "${REF_TYPE}" != "tag" || "${REF_NAME}" != v* ]]; then
              printf 'release push must be a v* tag\n' >&2
              exit 1
            fi
            version="${REF_NAME}"
            source_mode="tag"
          elif [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${REF}" != "refs/heads/main" ]]; then
              printf 'manual release workflow validation must run from main\n' >&2
              exit 1
            fi
          else
            printf 'unsupported release event: %s\n' "${EVENT_NAME}" >&2
            exit 1
          fi

          if [[ -z "${version}" ]]; then
            printf 'release version is required\n' >&2
            exit 1
          fi

          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)(\.[0-9]+)?)?$ ]]; then
            printf 'invalid release version: %s\n' "${version}" >&2
            exit 1
          fi

          kind="stable"
          case "${version}" in
            *-alpha*) kind="alpha" ;;
            *-beta*) kind="beta" ;;
            *-rc*) kind="rc" ;;
          esac

          {
            printf 'version=%s\n' "${version}"
            printf 'kind=%s\n' "${kind}"
            printf 'commit=%s\n' "${GITHUB_SHA}"
            printf 'source_mode=%s\n' "${source_mode}"
            if [[ "${source_mode}" == "tag" ]]; then
              printf 'publication=github-release-assets\n'
              printf 'publication_gate=same-commit-ci-release-metadata-and-github-release-publication-environment\n'
            else
              printf 'publication=blocked\n'
              printf 'publication_gate=manual-validation-does-not-publish\n'
            fi
          } >> "${GITHUB_OUTPUT}"

  same-commit-ci:
    runs-on: ubuntu-latest
    needs:
      - release-policy
    outputs:
      ci_gate: ${{ steps.lookup.outputs.ci_gate }}
      ci_run_id: ${{ steps.lookup.outputs.ci_run_id }}
      ci_run_url: ${{ steps.lookup.outputs.ci_run_url }}
      ci_run_conclusion: ${{ steps.lookup.outputs.ci_run_conclusion }}
    steps:
      - name: Verify same-commit main CI
        id: lookup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.release-policy.outputs.commit }}
        run: |
          set -euo pipefail

          ci_record="$(
            gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/workflows/build.yml/runs" \
              -f "head_sha=${RELEASE_COMMIT}" \
              -f status=success \
              -f per_page=50 \
              --jq '.workflow_runs | map(select(.head_branch == "main" and .conclusion == "success")) | first | if . == null then "" else [.id, .html_url, .conclusion] | @tsv end'
          )"

          if [[ -z "${ci_record}" ]]; then
            printf 'missing successful same-commit main build workflow for %s\n' "${RELEASE_COMMIT}" >&2
            exit 1
          fi

          IFS=$'\t' read -r ci_run_id ci_run_url ci_run_conclusion <<< "${ci_record}"

          {
            printf 'ci_gate=same-commit-main-build-success\n'
            printf 'ci_run_id=%s\n' "${ci_run_id}"
            printf 'ci_run_url=%s\n' "${ci_run_url}"
            printf 'ci_run_conclusion=%s\n' "${ci_run_conclusion}"
          } >> "${GITHUB_OUTPUT}"

  package-windows:
    runs-on: windows-latest
    needs:
      - release-policy
    env:
      RELEASE_VERSION: ${{ needs.release-policy.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-libsystre
            zip
      - name: Build Windows release binary
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $MsysRoot = $env:MSYS2_LOCATION
          $env:PATH = "$(Join-Path $MsysRoot 'ucrt64\bin');$(Join-Path $MsysRoot 'usr\bin');$env:PATH"
          cd mitm_anixops
          .\examples\windows-bilibili\build-windows.ps1
      - name: Package Windows release artifact
        shell: pwsh
        run: |
          $VersionNoV = $env:RELEASE_VERSION
          if ($VersionNoV.StartsWith("v")) {
            $VersionNoV = $VersionNoV.Substring(1)
          }
          $PackageName = "anixops-mitm-release-windows-x64-$VersionNoV"
          $PackageRoot = Join-Path "dist" $PackageName
          New-Item -ItemType Directory -Force (Join-Path $PackageRoot "build") | Out-Null
          Copy-Item mitm_anixops\build\anixops-mitm.exe (Join-Path $PackageRoot "build\")
          Copy-Item -Recurse mitm_anixops\examples $PackageRoot
          Copy-Item mitm_anixops\README.md $PackageRoot
          $ZipPath = Join-Path "dist" "$PackageName.zip"
          Compress-Archive -Path $PackageRoot -DestinationPath $ZipPath -Force
          $Hash = (Get-FileHash -Algorithm SHA256 $ZipPath).Hash.ToLowerInvariant()
          $ZipName = Split-Path -Leaf $ZipPath
          [System.IO.File]::WriteAllText("$ZipPath.sha256", "$Hash  $ZipName`n", [System.Text.Encoding]::ASCII)
      - uses: actions/upload-artifact@v7
        with:
          name: anixops-mitm-release-windows
          path: |
            dist/anixops-mitm-release-windows-x64-*.zip
            dist/anixops-mitm-release-windows-x64-*.zip.sha256

  package:
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - same-commit-ci
      - package-windows
    outputs:
      artifact_name: ${{ steps.build_package.outputs.artifact_name }}
      artifact_path: ${{ steps.build_package.outputs.artifact_path }}
      artifact_sha256_file: ${{ steps.build_package.outputs.artifact_sha256_file }}
      artifact_count: ${{ steps.build_package.outputs.artifact_count }}
      artifact_platforms: ${{ steps.build_package.outputs.artifact_platforms }}
      windows_artifact_name: ${{ steps.build_package.outputs.windows_artifact_name }}
      windows_artifact_path: ${{ steps.build_package.outputs.windows_artifact_path }}
      windows_artifact_sha256_file: ${{ steps.build_package.outputs.windows_artifact_sha256_file }}
      manifest_name: ${{ steps.build_package.outputs.manifest_name }}
      manifest_path: ${{ steps.build_package.outputs.manifest_path }}
      manifest_sha256_file: ${{ steps.build_package.outputs.manifest_sha256_file }}
      release_notes_path: ${{ steps.build_package.outputs.release_notes_path }}
      manifest_schema_version: ${{ steps.build_package.outputs.manifest_schema_version }}
      artifact_digest_algorithm: ${{ steps.build_package.outputs.artifact_digest_algorithm }}
      checksum_sidecar_format: ${{ steps.build_package.outputs.checksum_sidecar_format }}
      source_mode: ${{ steps.build_package.outputs.source_mode }}
      release_workflow_run_id: ${{ steps.build_package.outputs.release_workflow_run_id }}
      release_workflow_run_url: ${{ steps.build_package.outputs.release_workflow_run_url }}
      publication_gate: ${{ steps.build_package.outputs.publication_gate }}
      publish_eligibility_status: ${{ steps.build_package.outputs.publish_eligibility_status }}
      release_readiness_status: ${{ steps.readiness.outputs.release_readiness_status }}
      release_readiness_blocking_reason: ${{ steps.readiness.outputs.release_readiness_blocking_reason }}
      adapter_readiness_status: ${{ steps.build_package.outputs.adapter_readiness_status }}
      adapter_readiness_gate: ${{ steps.build_package.outputs.adapter_readiness_gate }}
      adapter_readiness_scope: ${{ steps.build_package.outputs.adapter_readiness_scope }}
      adapter_readiness_production_claim: ${{ steps.build_package.outputs.adapter_readiness_production_claim }}
      compatibility_supported_count: ${{ steps.build_package.outputs.compatibility_supported_count }}
      compatibility_partial_count: ${{ steps.build_package.outputs.compatibility_partial_count }}
      compatibility_planned_count: ${{ steps.build_package.outputs.compatibility_planned_count }}
      compatibility_unsupported_count: ${{ steps.build_package.outputs.compatibility_unsupported_count }}
      compatibility_total_count: ${{ steps.build_package.outputs.compatibility_total_count }}
    defaults:
      run:
        working-directory: mitm_anixops
    env:
      RELEASE_VERSION: ${{ needs.release-policy.outputs.version }}
      RELEASE_KIND: ${{ needs.release-policy.outputs.kind }}
      RELEASE_COMMIT: ${{ needs.release-policy.outputs.commit }}
      RELEASE_SOURCE_MODE: ${{ needs.release-policy.outputs.source_mode }}
      RELEASE_PUBLICATION: ${{ needs.release-policy.outputs.publication }}
      RELEASE_PUBLICATION_GATE: ${{ needs.release-policy.outputs.publication_gate }}
      RELEASE_CI_GATE: ${{ needs.same-commit-ci.outputs.ci_gate }}
      RELEASE_CI_RUN_ID: ${{ needs.same-commit-ci.outputs.ci_run_id }}
      RELEASE_CI_RUN_URL: ${{ needs.same-commit-ci.outputs.ci_run_url }}
      RELEASE_CI_RUN_CONCLUSION: ${{ needs.same-commit-ci.outputs.ci_run_conclusion }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libpcre2-dev libjq-dev zip unzip
      - name: Validate stable release readiness
        id: readiness
        shell: bash
        run: |
          set -euo pipefail

          sh scripts/manual-intervention-check.sh
          sh scripts/manual-intervention-transition-check.sh
          sh scripts/release-checklist-check.sh
          sh scripts/release-metadata-check.sh
          sh scripts/release-evidence-index-check.sh "${RELEASE_VERSION}"
          sh scripts/release-publication-verify-check.sh
          sh scripts/release-publication-verify-test.sh
          sh scripts/compatibility-status-summary-check.sh
          sh scripts/script-runtime-security-gate.sh
          sh scripts/production-mitm-roadmap-check.sh
          sh scripts/integration-adapter-readiness-check.sh

          readiness_output="${RUNNER_TEMP}/release-readiness.env"
          sh scripts/release-readiness-check.sh "${RELEASE_VERSION}" | tee "${readiness_output}"
          status="$(awk -F= '$1 == "release_readiness_status" {print $2}' "${readiness_output}")"
          reason="$(awk -F= '$1 == "release_readiness_blocking_reason" {print $2}' "${readiness_output}")"
          markers="$(awk -F= '$1 == "release_readiness_blocking_markers" {print $2}' "${readiness_output}")"
          planned_rows="$(awk -F= '$1 == "release_readiness_planned_row_count" {print $2}' "${readiness_output}")"
          test -n "${status}"
          test -n "${reason}"

          {
            printf 'release_readiness_status=%s\n' "${status}"
            printf 'release_readiness_blocking_reason=%s\n' "${reason}"
            printf 'release_readiness_blocking_markers=%s\n' "${markers:-none}"
            printf 'release_readiness_planned_row_count=%s\n' "${planned_rows:-unknown}"
          } >> "${GITHUB_OUTPUT}"
      - name: Summarize compatibility matrix status
        id: compatibility
        shell: bash
        run: |
          set -euo pipefail

          compatibility_output="${RUNNER_TEMP}/compatibility-status.env"
          sh scripts/compatibility-status-summary-check.sh
          sh scripts/compatibility-status-summary.sh | tee "${compatibility_output}"
          for key in \
            compatibility_supported_count \
            compatibility_partial_count \
            compatibility_planned_count \
            compatibility_unsupported_count \
            compatibility_total_count
          do
            value="$(awk -F= -v key="${key}" '$1 == key {print $2}' "${compatibility_output}")"
            test -n "${value}"
            printf '%s=%s\n' "${key}" "${value}" >> "${GITHUB_OUTPUT}"
          done
      - name: Run release build gate
        run: |
          sh scripts/ensure-mihomo.sh
          sh scripts/check.sh
      - uses: actions/download-artifact@v7
        with:
          name: anixops-mitm-release-windows
          path: mitm_anixops/build/release-windows
      - name: Build release artifact
        id: build_package
        shell: bash
        run: |
          set -euo pipefail

          version_no_v="${RELEASE_VERSION#v}"
          release_readiness_status="${{ steps.readiness.outputs.release_readiness_status }}"
          release_readiness_blocking_reason="${{ steps.readiness.outputs.release_readiness_blocking_reason }}"
          manifest_schema_version="release-manifest-v1"
          artifact_digest_algorithm="sha256"
          checksum_sidecar_format="sha256sum-two-space-filename"
          artifact_count="2"
          artifact_platforms="linux-x64,windows-x64"
          release_workflow_run_id="${GITHUB_RUN_ID}"
          release_workflow_run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          adapter_readiness_status="ci-gated-alpha-boundary"
          adapter_readiness_gate="scripts/integration-adapter-readiness-check.sh"
          adapter_readiness_scope="policy-core-runner-proxy-shim-bindings-docs"
          adapter_readiness_production_claim="not-production-networkcore-adapter"
          compatibility_supported_count="${{ steps.compatibility.outputs.compatibility_supported_count }}"
          compatibility_partial_count="${{ steps.compatibility.outputs.compatibility_partial_count }}"
          compatibility_planned_count="${{ steps.compatibility.outputs.compatibility_planned_count }}"
          compatibility_unsupported_count="${{ steps.compatibility.outputs.compatibility_unsupported_count }}"
          compatibility_total_count="${{ steps.compatibility.outputs.compatibility_total_count }}"
          package_name="anixops-mitm-release-${version_no_v}"
          make "ALPHA_NAME=${package_name}" alpha-dist

          artifact_path="build/${package_name}.tar.gz"
          artifact_name="$(basename "${artifact_path}")"
          test -s "${artifact_path}"

          artifact_sha256="$(sha256sum "${artifact_path}" | awk '{print $1}')"
          artifact_sha256_file="build/${artifact_name}.sha256"
          printf '%s  %s\n' "${artifact_sha256}" "${artifact_name}" > "${artifact_sha256_file}"

          windows_artifact_path="$(find build/release-windows -maxdepth 1 -type f -name 'anixops-mitm-release-windows-x64-*.zip' | sort | head -n 1)"
          windows_artifact_name="$(basename "${windows_artifact_path}")"
          windows_artifact_sha256_file="${windows_artifact_path}.sha256"
          test -s "${windows_artifact_path}"
          test -s "${windows_artifact_sha256_file}"
          cp "${windows_artifact_path}" "build/${windows_artifact_name}"
          cp "${windows_artifact_sha256_file}" "build/${windows_artifact_name}.sha256"
          windows_artifact_path="build/${windows_artifact_name}"
          windows_artifact_sha256_file="build/${windows_artifact_name}.sha256"
          windows_artifact_sha256="$(awk '{print $1}' "${windows_artifact_sha256_file}")"
          test -n "${windows_artifact_sha256}"

          sh scripts/release-sensitive-material-check.sh "${artifact_path}" "${windows_artifact_path}"

          publish_eligibility_status="blocked"
          publish_blocking_reason="manual-release-validation-does-not-publish"
          if [[ "${RELEASE_SOURCE_MODE}" == "tag" ]]; then
            publish_eligibility_status="eligible"
            publish_blocking_reason="same-commit-ci-and-release-metadata-gates-passed"
          fi

          manifest_name="anixops-mitm-release-${version_no_v}-manifest.json"
          manifest_path="build/${manifest_name}"
          {
            printf '{\n'
            printf '  "release_version": "%s",\n' "${RELEASE_VERSION}"
            printf '  "manifest_schema_version": "%s",\n' "${manifest_schema_version}"
            printf '  "artifact_digest_algorithm": "%s",\n' "${artifact_digest_algorithm}"
            printf '  "checksum_sidecar_format": "%s",\n' "${checksum_sidecar_format}"
            printf '  "release_kind": "%s",\n' "${RELEASE_KIND}"
            printf '  "release_commit": "%s",\n' "${RELEASE_COMMIT}"
            printf '  "source_mode": "%s",\n' "${RELEASE_SOURCE_MODE}"
            printf '  "release_workflow_run_id": "%s",\n' "${release_workflow_run_id}"
            printf '  "release_workflow_run_url": "%s",\n' "${release_workflow_run_url}"
            printf '  "ci_gate": "%s",\n' "${RELEASE_CI_GATE}"
            printf '  "ci_run_id": "%s",\n' "${RELEASE_CI_RUN_ID}"
            printf '  "ci_run_url": "%s",\n' "${RELEASE_CI_RUN_URL}"
            printf '  "ci_run_conclusion": "%s",\n' "${RELEASE_CI_RUN_CONCLUSION}"
            printf '  "publication": "%s",\n' "${RELEASE_PUBLICATION}"
            printf '  "publication_gate": "%s",\n' "${RELEASE_PUBLICATION_GATE}"
            printf '  "publish_eligibility_status": "%s",\n' "${publish_eligibility_status}"
            printf '  "release_readiness_status": "%s",\n' "${release_readiness_status}"
            printf '  "release_readiness_blocking_reason": "%s",\n' "${release_readiness_blocking_reason}"
            printf '  "adapter_readiness_status": "%s",\n' "${adapter_readiness_status}"
            printf '  "adapter_readiness_gate": "%s",\n' "${adapter_readiness_gate}"
            printf '  "adapter_readiness_scope": "%s",\n' "${adapter_readiness_scope}"
            printf '  "adapter_readiness_production_claim": "%s",\n' "${adapter_readiness_production_claim}"
            printf '  "compatibility_scope": "alpha policy-core release artifact",\n'
            printf '  "compatibility_supported_count": %s,\n' "${compatibility_supported_count}"
            printf '  "compatibility_partial_count": %s,\n' "${compatibility_partial_count}"
            printf '  "compatibility_planned_count": %s,\n' "${compatibility_planned_count}"
            printf '  "compatibility_unsupported_count": %s,\n' "${compatibility_unsupported_count}"
            printf '  "compatibility_total_count": %s,\n' "${compatibility_total_count}"
            printf '  "artifact_count": %s,\n' "${artifact_count}"
            printf '  "artifact_platforms": ["linux-x64", "windows-x64"],\n'
            printf '  "artifacts": [\n'
            printf '    {\n'
            printf '      "platform": "linux-x64",\n'
            printf '      "name": "%s",\n' "${artifact_name}"
            printf '      "path": "%s",\n' "${artifact_path}"
            printf '      "sha256": "%s",\n' "${artifact_sha256}"
            printf '      "sha256_file": "%s"\n' "$(basename "${artifact_sha256_file}")"
            printf '    },\n'
            printf '    {\n'
            printf '      "platform": "windows-x64",\n'
            printf '      "name": "%s",\n' "${windows_artifact_name}"
            printf '      "path": "%s",\n' "${windows_artifact_path}"
            printf '      "sha256": "%s",\n' "${windows_artifact_sha256}"
            printf '      "sha256_file": "%s"\n' "$(basename "${windows_artifact_sha256_file}")"
            printf '    }\n'
            printf '  ]\n'
            printf '}\n'
          } > "${manifest_path}"

          manifest_sha256="$(sha256sum "${manifest_path}" | awk '{print $1}')"
          manifest_sha256_file="build/${manifest_name}.sha256"
          printf '%s  %s\n' "${manifest_sha256}" "${manifest_name}" > "${manifest_sha256_file}"

          release_notes_path="build/release-notes.md"
          {
            printf '# mitm_anixops %s Release Artifact\n\n' "${RELEASE_VERSION}"
            printf 'Commit: %s\n\n' "${RELEASE_COMMIT}"
            printf 'Source mode: %s\n\n' "${RELEASE_SOURCE_MODE}"
            printf 'CI gate: %s.\n\n' "${RELEASE_CI_GATE}"
            printf 'CI run: %s (id %s, conclusion %s).\n\n' "${RELEASE_CI_RUN_URL}" "${RELEASE_CI_RUN_ID}" "${RELEASE_CI_RUN_CONCLUSION}"
            printf 'Release workflow run: %s.\n\n' "${release_workflow_run_url}"
            printf 'Publication: %s.\n\n' "${RELEASE_PUBLICATION}"
            printf 'Publication gate: %s.\n\n' "${RELEASE_PUBLICATION_GATE}"
            printf 'Manifest schema: %s.\n\n' "${manifest_schema_version}"
            printf 'Artifact digest algorithm: %s; checksum sidecars: %s.\n\n' "${artifact_digest_algorithm}" "${checksum_sidecar_format}"
            printf 'Release readiness: %s (%s).\n\n' "${release_readiness_status}" "${release_readiness_blocking_reason}"
            printf 'Adapter readiness: %s via %s.\n\n' "${adapter_readiness_status}" "${adapter_readiness_gate}"
            printf 'Adapter readiness scope: %s; production claim: %s.\n\n' "${adapter_readiness_scope}" "${adapter_readiness_production_claim}"
            printf 'Feature additions: see CHANGELOG.md for release-specific Added entries; this release note keeps the shipped feature scope tied to the published artifact evidence below.\n\n'
            printf 'BUG fixes: see CHANGELOG.md for release-specific Fixed entries; if no Fixed entry exists for this version, no user-visible bug fix is declared by this release.\n\n'
            printf 'Release artifacts: Linux x64 policy-core tarball and Windows x64 shim zip.\n\n'
            printf 'Artifact count: %s; platforms: %s.\n\n' "${artifact_count}" "${artifact_platforms}"
            printf 'Compatibility matrix status counts: supported=%s, partial=%s, planned=%s, unsupported=%s, total=%s.\n\n' \
              "${compatibility_supported_count}" \
              "${compatibility_partial_count}" \
              "${compatibility_planned_count}" \
              "${compatibility_unsupported_count}" \
              "${compatibility_total_count}"
            if [[ "${RELEASE_KIND}" == "stable" ]]; then
              printf 'Compatibility scope: v1 policy core, runner, bindings, and docs as documented in the compatibility matrix.\n\n'
              printf 'Known gaps: partial and unsupported matrix rows remain limited by their source contracts; no signing/notarization, no platform certificate lifecycle, no production embedded JavaScript runtime, and no platform app-store release assets.\n\n'
            else
              printf 'Compatibility scope: prerelease policy core, runner, bindings, and docs.\n\n'
              printf 'Known gaps: no v1.0.0 stable release claim, no signing/notarization, no platform certificate lifecycle, no production embedded JavaScript runtime, and no platform app-store release assets.\n\n'
            fi
            if [[ "${RELEASE_VERSION}" == "v1.0.1" ]]; then
              printf 'Replacement note: this release supersedes the tag-only v1.0.0 publication attempt. The v1.0.0 release workflow failed before creating public GitHub Release assets because the publish job lacked explicit GH_REPO context; the v1.0.0 tag remains immutable and no v1.0.0 public release assets were published.\n\n'
            fi
            printf 'Rollback path: delete the untrusted workflow artifact and create a new\n'
            printf 'tag only after the release gate passes on the replacement commit. Public\n'
            printf 'tags and release assets are immutable by default; use a successor tag for\n'
            printf 'corrected public artifacts.\n'
          } > "${release_notes_path}"

          {
            printf 'release_version=%s\n' "${RELEASE_VERSION}"
            printf 'release_kind=%s\n' "${RELEASE_KIND}"
            printf 'release_commit=%s\n' "${RELEASE_COMMIT}"
            printf 'source_mode=%s\n' "${RELEASE_SOURCE_MODE}"
            printf 'ci_gate=%s\n' "${RELEASE_CI_GATE}"
            printf 'ci_run_id=%s\n' "${RELEASE_CI_RUN_ID}"
            printf 'ci_run_url=%s\n' "${RELEASE_CI_RUN_URL}"
            printf 'ci_run_conclusion=%s\n' "${RELEASE_CI_RUN_CONCLUSION}"
            printf 'artifact_name=%s\n' "${artifact_name}"
            printf 'artifact_path=%s\n' "${artifact_path}"
            printf 'artifact_sha256=%s\n' "${artifact_sha256}"
            printf 'artifact_sha256_file=%s\n' "${artifact_sha256_file}"
            printf 'artifact_count=%s\n' "${artifact_count}"
            printf 'artifact_platforms=%s\n' "${artifact_platforms}"
            printf 'windows_artifact_name=%s\n' "${windows_artifact_name}"
            printf 'windows_artifact_path=%s\n' "${windows_artifact_path}"
            printf 'windows_artifact_sha256=%s\n' "${windows_artifact_sha256}"
            printf 'windows_artifact_sha256_file=%s\n' "${windows_artifact_sha256_file}"
            printf 'manifest_name=%s\n' "${manifest_name}"
            printf 'manifest_path=%s\n' "${manifest_path}"
            printf 'manifest_sha256=%s\n' "${manifest_sha256}"
