name: build

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify v1 governance baseline
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            mitm_anixops/README.md
            mitm_anixops/ROADMAP.md
            mitm_anixops/TODO.md
            mitm_anixops/CHANGELOG.md
            mitm_anixops/CONTRIBUTING.md
            mitm_anixops/docs/architecture/repository-audit.md
            mitm_anixops/docs/architecture/overview.md
            mitm_anixops/docs/architecture/release-gate.md
            mitm_anixops/docs/architecture/release-dry-run.md
            mitm_anixops/docs/compatibility/README.md
            mitm_anixops/docs/compatibility/source-contracts.md
            mitm_anixops/docs/compatibility/loon-plugin-common-fields.md
            mitm_anixops/docs/compatibility/quantumultx-common-config.md
            mitm_anixops/docs/compatibility/surge-module-common-config.md
            mitm_anixops/docs/compatibility/request-rewrite-common.md
            mitm_anixops/docs/compatibility/response-rewrite-common.md
            mitm_anixops/docs/compatibility/header-mutation-common.md
            mitm_anixops/docs/compatibility/body-mutation-common.md
            mitm_anixops/docs/compatibility/decision-trace-schema.md
            mitm_anixops/docs/compatibility/plan-api-parity.md
            mitm_anixops/docs/compatibility/matrix.md
            mitm_anixops/docs/manual-intervention.md
            mitm_anixops/tests/fixtures/Loon.CommonFields.plugin
            mitm_anixops/tests/fixtures/Loon.CommonFields.Malformed.plugin
            mitm_anixops/tests/fixtures/QuantumultX.CommonConfig.snippet
            mitm_anixops/tests/fixtures/QuantumultX.CommonConfig.Malformed.snippet
            mitm_anixops/tests/fixtures/Surge.CommonConfig.sgmodule
            mitm_anixops/tests/fixtures/Surge.CommonConfig.Malformed.sgmodule
            mitm_anixops/tests/fixtures/RequestRewrite.Common.conf
            mitm_anixops/tests/fixtures/RequestRewrite.Common.Malformed.conf
            mitm_anixops/tests/fixtures/HeaderMutation.Common.conf
            mitm_anixops/tests/fixtures/HeaderMutation.Common.Malformed.conf
            mitm_anixops/tests/fixtures/ResponseRewrite.Common.conf
            mitm_anixops/tests/fixtures/ResponseRewrite.Common.Malformed.conf
            mitm_anixops/tests/fixtures/BodyMutation.Common.conf
            mitm_anixops/tests/fixtures/BodyMutation.Common.Malformed.conf
            mitm_anixops/tests/fixtures/DecisionTrace.Schema.conf
            mitm_anixops/tests/fixtures/DecisionTrace.Schema.UnsupportedPolicy.conf
            mitm_anixops/tests/fixtures/PlanApiParity.Golden.conf
            mitm_anixops/tests/fixtures/PlanApiParity.PhaseMismatch.conf
            .github/pull_request_template.md
          )
          for file in "${required_files[@]}"; do
            test -f "${file}"
          done
          grep -q "P0 Repository Baseline" mitm_anixops/ROADMAP.md
          grep -q "P1 Plugin Parser" mitm_anixops/ROADMAP.md
          grep -q "P2 Rule Matching Engine" mitm_anixops/ROADMAP.md
          grep -q "P3 Script And Runtime Compatibility" mitm_anixops/ROADMAP.md
          grep -q "P4 MITM Policy And Certificate Lifecycle" mitm_anixops/ROADMAP.md
          grep -q "P5 Integration Adapter" mitm_anixops/ROADMAP.md
          grep -q "P6 Release Hardening" mitm_anixops/ROADMAP.md
          grep -q "GitHub Actions" mitm_anixops/CONTRIBUTING.md
          grep -q "branch-protection-status=pending" mitm_anixops/docs/manual-intervention.md
          grep -q "Loon plugin common fields" mitm_anixops/docs/compatibility/matrix.md
          grep -q "Loon Plugin Common Fields Source Contract" mitm_anixops/docs/compatibility/loon-plugin-common-fields.md
          grep -q "Loon.CommonFields.plugin" mitm_anixops/docs/compatibility/matrix.md
          grep -q "config/loon_common_fields_fixture_is_supported" mitm_anixops/tests/test_config.c
          grep -q "config/loon_common_fields_strict_fixture_rejects_malformed_rule" mitm_anixops/tests/test_config.c
          grep -q "Quantumult X rewrite/task/mitm common config" mitm_anixops/docs/compatibility/matrix.md
          grep -q "Quantumult X Common Config Source Contract" mitm_anixops/docs/compatibility/quantumultx-common-config.md
          grep -q "QuantumultX.CommonConfig.snippet" mitm_anixops/docs/compatibility/matrix.md
          grep -q "config/quantumultx_common_config_fixture_is_supported" mitm_anixops/tests/test_config.c
          grep -q "config/quantumultx_common_config_strict_fixture_rejects_malformed_rule" mitm_anixops/tests/test_config.c
          grep -q "Surge module common config" mitm_anixops/docs/compatibility/matrix.md
          grep -q "Surge Module Common Config Source Contract" mitm_anixops/docs/compatibility/surge-module-common-config.md
          grep -q "Surge.CommonConfig.sgmodule" mitm_anixops/docs/compatibility/matrix.md
          grep -q "config/surge_common_config_fixture_is_supported" mitm_anixops/tests/test_config.c
          grep -q "config/surge_common_config_strict_fixture_rejects_malformed_rule" mitm_anixops/tests/test_config.c
          grep -q "request rewrite" mitm_anixops/docs/compatibility/matrix.md
          grep -q "Request Rewrite Common Source Contract" mitm_anixops/docs/compatibility/request-rewrite-common.md
          grep -q "RequestRewrite.Common.conf" mitm_anixops/docs/compatibility/matrix.md
          grep -q "config/request_rewrite_common_fixture_is_supported" mitm_anixops/tests/test_config.c
          grep -q "config/request_rewrite_common_strict_fixture_rejects_malformed_rule" mitm_anixops/tests/test_config.c
          grep -q "header mutation" mitm_anixops/docs/compatibility/matrix.md
          grep -q "Header Mutation Common Source Contract" mitm_anixops/docs/compatibility/header-mutation-common.md
          grep -q "HeaderMutation.Common.conf" mitm_anixops/docs/compatibility/matrix.md
          grep -q "config/header_mutation_common_fixture_is_supported" mitm_anixops/tests/test_config.c
          grep -q "config/header_mutation_common_fixture_rejects_invalid_regex" mitm_anixops/tests/test_config.c
          grep -q "response rewrite" mitm_anixops/docs/compatibility/matrix.md
          grep -q "Response Rewrite Common Source Contract" mitm_anixops/docs/compatibility/response-rewrite-common.md
          grep -q "ResponseRewrite.Common.conf" mitm_anixops/docs/compatibility/matrix.md
          grep -q "config/response_rewrite_common_fixture_is_supported" mitm_anixops/tests/test_config.c
          grep -q "config/response_rewrite_common_fixture_rejects_invalid_body_regex" mitm_anixops/tests/test_config.c
          grep -q "body mutation" mitm_anixops/docs/compatibility/matrix.md
          grep -q "Body Mutation Common Source Contract" mitm_anixops/docs/compatibility/body-mutation-common.md
          grep -q "BodyMutation.Common.conf" mitm_anixops/docs/compatibility/matrix.md
          grep -q "config/body_mutation_common_fixture_is_supported" mitm_anixops/tests/test_config.c
          grep -q "config/body_mutation_common_fixture_rejects_invalid_body_regex" mitm_anixops/tests/test_config.c
          grep -q "decision trace schema" mitm_anixops/docs/compatibility/matrix.md
          grep -q "Decision Trace Schema Source Contract" mitm_anixops/docs/compatibility/decision-trace-schema.md
          grep -q "DecisionTrace.Schema.conf" mitm_anixops/docs/compatibility/matrix.md
          grep -q "config/decision_trace_schema_fixture_covers_policy_fields" mitm_anixops/tests/test_config.c
          grep -q "config/decision_trace_schema_fixture_ignores_unsupported_policy_intent" mitm_anixops/tests/test_config.c
          grep -q "plan API parity" mitm_anixops/docs/compatibility/matrix.md
          grep -q "Plan API Parity Source Contract" mitm_anixops/docs/compatibility/plan-api-parity.md
          grep -q "PlanApiParity.Golden.conf" mitm_anixops/docs/compatibility/matrix.md
          grep -q "config/plan_api_parity_fixture_matches_legacy_evaluation" mitm_anixops/tests/test_config.c
          grep -q "config/plan_api_parity_fixture_keeps_phase_mismatches_empty" mitm_anixops/tests/test_config.c
          grep -q "Stash migration notes" mitm_anixops/docs/compatibility/matrix.md
          grep -q "Shadowrocket migration notes" mitm_anixops/docs/compatibility/matrix.md
          grep -q "Known CI/CD gaps for v1.0.0" mitm_anixops/docs/architecture/repository-audit.md
          grep -q "Current gap: no dedicated release workflow exists" mitm_anixops/docs/architecture/release-gate.md
          grep -q "release-dry-run-current-mode=contract-only" mitm_anixops/docs/architecture/release-dry-run.md
          grep -q "Source contract:" .github/pull_request_template.md
          grep -q "Manual intervention required" .github/pull_request_template.md

  linux-test:
    runs-on: ubuntu-latest
    needs:
      - governance
    defaults:
      run:
        working-directory: mitm_anixops
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libpcre2-dev libjq-dev
      - name: Install mihomo fixture binary
        run: sh scripts/ensure-mihomo.sh
      - name: Run full project check
        run: |
          sh scripts/check.sh
      - name: Build Alpha package
        run: make alpha-dist
      - uses: actions/upload-artifact@v7
        with:
          name: anixops-mitm-alpha-linux
          path: mitm_anixops/build/anixops-mitm-alpha-*.tar.gz

  windows-binary:
    runs-on: windows-latest
    needs:
      - governance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-libsystre
            zip
      - name: Build Windows binary
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $MsysRoot = $env:MSYS2_LOCATION
          $env:PATH = "$(Join-Path $MsysRoot 'ucrt64\bin');$(Join-Path $MsysRoot 'usr\bin');$env:PATH"
          cd mitm_anixops
          .\examples\windows-bilibili\build-windows.ps1
      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\anixops-mitm-windows-x64\build | Out-Null
          Copy-Item mitm_anixops\build\anixops-mitm.exe dist\anixops-mitm-windows-x64\build\
          Copy-Item -Recurse mitm_anixops\examples dist\anixops-mitm-windows-x64\
          Copy-Item mitm_anixops\README.md dist\anixops-mitm-windows-x64\
          Compress-Archive -Path dist\anixops-mitm-windows-x64 -DestinationPath dist\anixops-mitm-windows-x64.zip -Force
      - uses: actions/upload-artifact@v7
        with:
          name: anixops-mitm-windows-x64
          path: dist/anixops-mitm-windows-x64.zip
