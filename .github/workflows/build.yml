  compatibility-matrix:
    runs-on: ubuntu-latest
    needs:
      - governance
    steps:
      - uses: actions/checkout@v7
      - name: Validate compatibility matrix contract
        run: sh mitm_anixops/scripts/compatibility-matrix-check.sh

  format-check:
    runs-on: ubuntu-latest
    needs:
      - governance
    steps:
      - uses: actions/checkout@v7
      - name: Validate static formatting
        run: sh mitm_anixops/scripts/static-format-check.sh

  lint:
    runs-on: ubuntu-latest
    needs:
      - governance
    steps:
      - uses: actions/checkout@v7
      - name: Install lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Validate shell lint
        run: sh mitm_anixops/scripts/static-lint-check.sh

  macos-smoke:
    runs-on: macos-latest
    needs:
      - governance
    defaults:
      run:
        working-directory: mitm_anixops
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
      - name: Run macOS policy-core smoke
        run: |
          make clean
          make test
          make demo-check
          make runner-check
          make proxy-shim-check

  linux-test:
    runs-on: ubuntu-latest
    needs:
      - governance
    defaults:
      run:
        working-directory: mitm_anixops
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libpcre2-dev libjq-dev
      - name: Install mihomo fixture binary
        run: sh scripts/ensure-mihomo.sh
      - name: Run full project check
        run: |
          sh scripts/check.sh
      - name: Build Alpha package
        run: make alpha-dist
      - uses: actions/upload-artifact@v7
        with:
          name: anixops-mitm-alpha-linux
          path: mitm_anixops/build/anixops-mitm-alpha-*.tar.gz

  windows-binary:
    runs-on: windows-latest
    needs:
      - governance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-libsystre
            zip
      - name: Build Windows binary
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $MsysRoot = $env:MSYS2_LOCATION
          $env:PATH = "$(Join-Path $MsysRoot 'ucrt64\bin');$(Join-Path $MsysRoot 'usr\bin');$env:PATH"
          cd mitm_anixops
          .\examples\windows-bilibili\build-windows.ps1
      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\anixops-mitm-windows-x64\build | Out-Null
          Copy-Item mitm_anixops\build\anixops-mitm.exe dist\anixops-mitm-windows-x64\build\
          Copy-Item -Recurse mitm_anixops\examples dist\anixops-mitm-windows-x64\
          Copy-Item mitm_anixops\README.md dist\anixops-mitm-windows-x64\
          Compress-Archive -Path dist\anixops-mitm-windows-x64 -DestinationPath dist\anixops-mitm-windows-x64.zip -Force
      - uses: actions/upload-artifact@v7
        with:
          name: anixops-mitm-windows-x64
          path: dist/anixops-mitm-windows-x64.zip
