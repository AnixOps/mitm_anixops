name: release-dry-run

on:
  workflow_dispatch:
    inputs:
      version:
        description: Dry-run release version.
        required: true
        default: v0.45.10-alpha.1
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  release-policy:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.policy.outputs.version }}
      kind: ${{ steps.policy.outputs.kind }}
      commit: ${{ steps.policy.outputs.commit }}
      publication: ${{ steps.policy.outputs.publication }}
      ci_gate: ${{ steps.policy.outputs.ci_gate }}
    steps:
      - uses: actions/checkout@v7
      - name: Validate dry-run policy
        id: policy
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION}"
          if [[ -z "${version}" ]]; then
            version="v0.45.10-alpha.${GITHUB_RUN_NUMBER}"
          fi

          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|rc)\.[0-9]+)?$ ]]; then
            printf 'invalid dry-run version: %s\n' "${version}" >&2
            exit 1
          fi

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            if [[ "${BASE_REF}" != "main" ]]; then
              printf 'release dry-run pull requests must target main\n' >&2
              exit 1
            fi
          elif [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            printf 'release dry-run must run from main\n' >&2
            exit 1
          fi

          kind="stable"
          case "${version}" in
            *-alpha.*) kind="alpha" ;;
            *-rc.*) kind="rc" ;;
          esac

          {
            printf 'version=%s\n' "${version}"
            printf 'kind=%s\n' "${kind}"
            printf 'commit=%s\n' "${GITHUB_SHA}"
            printf 'publication=blocked\n'
            printf 'ci_gate=equivalent-full-check-in-workflow\n'
          } >> "${GITHUB_OUTPUT}"

  dry-run:
    runs-on: ubuntu-latest
    needs:
      - release-policy
      - package-windows
    defaults:
      run:
        working-directory: mitm_anixops
    env:
      RELEASE_VERSION: ${{ needs.release-policy.outputs.version }}
      RELEASE_KIND: ${{ needs.release-policy.outputs.kind }}
      RELEASE_COMMIT: ${{ needs.release-policy.outputs.commit }}
      RELEASE_PUBLICATION: ${{ needs.release-policy.outputs.publication }}
      RELEASE_CI_GATE: ${{ needs.release-policy.outputs.ci_gate }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libpcre2-dev libjq-dev
      - name: Validate dry-run release readiness
        id: readiness
        shell: bash
        run: |
          set -euo pipefail

          sh scripts/manual-intervention-check.sh
          sh scripts/manual-intervention-transition-check.sh
          sh scripts/release-checklist-check.sh
          sh scripts/release-metadata-check.sh
          sh scripts/compatibility-status-summary-check.sh

          readiness_output="${RUNNER_TEMP}/release-readiness.env"
          sh scripts/release-readiness-check.sh "${RELEASE_VERSION}" | tee "${readiness_output}"
          status="$(awk -F= '$1 == "release_readiness_status" {print $2}' "${readiness_output}")"
          reason="$(awk -F= '$1 == "release_readiness_blocking_reason" {print $2}' "${readiness_output}")"
          test -n "${status}"
          test -n "${reason}"

          {
            printf 'release_readiness_status=%s\n' "${status}"
            printf 'release_readiness_blocking_reason=%s\n' "${reason}"
          } >> "${GITHUB_OUTPUT}"
      - name: Summarize compatibility matrix status
        id: compatibility
        shell: bash
        run: |
          set -euo pipefail

          compatibility_output="${RUNNER_TEMP}/compatibility-status.env"
          sh scripts/compatibility-status-summary-check.sh
          sh scripts/compatibility-status-summary.sh | tee "${compatibility_output}"
          for key in \
            compatibility_supported_count \
            compatibility_partial_count \
            compatibility_planned_count \
            compatibility_unsupported_count \
            compatibility_total_count
          do
            value="$(awk -F= -v key="${key}" '$1 == key {print $2}' "${compatibility_output}")"
            test -n "${value}"
            printf '%s=%s\n' "${key}" "${value}" >> "${GITHUB_OUTPUT}"
          done
      - name: Run same-workflow CI gate
        run: |
          sh scripts/ensure-mihomo.sh
          sh scripts/check.sh
      - uses: actions/download-artifact@v7
        with:
          name: anixops-mitm-release-dry-run-windows
          path: mitm_anixops/build/release-dry-run-windows
      - name: Build dry-run artifact and metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          version_no_v="${RELEASE_VERSION#v}"
          release_readiness_status="${{ steps.readiness.outputs.release_readiness_status }}"
          release_readiness_blocking_reason="${{ steps.readiness.outputs.release_readiness_blocking_reason }}"
          compatibility_supported_count="${{ steps.compatibility.outputs.compatibility_supported_count }}"
          compatibility_partial_count="${{ steps.compatibility.outputs.compatibility_partial_count }}"
          compatibility_planned_count="${{ steps.compatibility.outputs.compatibility_planned_count }}"
          compatibility_unsupported_count="${{ steps.compatibility.outputs.compatibility_unsupported_count }}"
          compatibility_total_count="${{ steps.compatibility.outputs.compatibility_total_count }}"
          package_name="anixops-mitm-release-dry-run-${version_no_v}"
          make "ALPHA_NAME=${package_name}" alpha-dist

          artifact_path="build/${package_name}.tar.gz"
          artifact_name="$(basename "${artifact_path}")"
          artifact_sha256="$(sha256sum "${artifact_path}" | awk '{print $1}')"
          artifact_sha256_file="build/${artifact_name}.sha256"
          printf '%s  %s\n' "${artifact_sha256}" "${artifact_name}" > "${artifact_sha256_file}"

          windows_artifact_path="$(find build/release-dry-run-windows -maxdepth 1 -type f -name 'anixops-mitm-release-dry-run-windows-x64-*.zip' | sort | head -n 1)"
          windows_artifact_name="$(basename "${windows_artifact_path}")"
          windows_artifact_sha256_file="${windows_artifact_path}.sha256"
          test -s "${windows_artifact_path}"
          test -s "${windows_artifact_sha256_file}"
          cp "${windows_artifact_path}" "build/${windows_artifact_name}"
          cp "${windows_artifact_sha256_file}" "build/${windows_artifact_name}.sha256"
          windows_artifact_path="build/${windows_artifact_name}"
          windows_artifact_sha256_file="build/${windows_artifact_name}.sha256"
          windows_artifact_sha256="$(awk '{print $1}' "${windows_artifact_sha256_file}")"
          test -n "${windows_artifact_sha256}"

          manifest_name="anixops-mitm-release-dry-run-${version_no_v}-manifest.json"
          manifest_path="build/${manifest_name}"
          {
            printf '{\n'
            printf '  "release_version": "%s",\n' "${RELEASE_VERSION}"
            printf '  "release_kind": "%s",\n' "${RELEASE_KIND}"
            printf '  "release_commit": "%s",\n' "${RELEASE_COMMIT}"
            printf '  "ci_gate": "%s",\n' "${RELEASE_CI_GATE}"
            printf '  "publication": "%s",\n' "${RELEASE_PUBLICATION}"
            printf '  "compatibility_scope": "alpha policy-core dry-run",\n'
            printf '  "manual_intervention_status": "pending-items-block-publication",\n'
            printf '  "release_readiness_status": "%s",\n' "${release_readiness_status}"
            printf '  "release_readiness_blocking_reason": "%s",\n' "${release_readiness_blocking_reason}"
            printf '  "compatibility_supported_count": %s,\n' "${compatibility_supported_count}"
            printf '  "compatibility_partial_count": %s,\n' "${compatibility_partial_count}"
            printf '  "compatibility_planned_count": %s,\n' "${compatibility_planned_count}"
            printf '  "compatibility_unsupported_count": %s,\n' "${compatibility_unsupported_count}"
            printf '  "compatibility_total_count": %s,\n' "${compatibility_total_count}"
            printf '  "artifacts": [\n'
            printf '    {\n'
            printf '      "platform": "linux-x64",\n'
            printf '      "name": "%s",\n' "${artifact_name}"
            printf '      "path": "%s",\n' "${artifact_path}"
            printf '      "sha256": "%s",\n' "${artifact_sha256}"
            printf '      "sha256_file": "%s"\n' "$(basename "${artifact_sha256_file}")"
            printf '    },\n'
            printf '    {\n'
            printf '      "platform": "windows-x64",\n'
            printf '      "name": "%s",\n' "${windows_artifact_name}"
            printf '      "path": "%s",\n' "${windows_artifact_path}"
            printf '      "sha256": "%s",\n' "${windows_artifact_sha256}"
            printf '      "sha256_file": "%s"\n' "$(basename "${windows_artifact_sha256_file}")"
            printf '    }\n'
            printf '  ]\n'
            printf '}\n'
          } > "${manifest_path}"

          manifest_sha256="$(sha256sum "${manifest_path}" | awk '{print $1}')"
          manifest_sha256_file="build/${manifest_name}.sha256"
          printf '%s  %s\n' "${manifest_sha256}" "${manifest_name}" > "${manifest_sha256_file}"

          release_notes_path="build/release-notes-dry-run.md"
          {
            printf '# mitm_anixops %s Dry Run\n\n' "${RELEASE_VERSION}"
            printf 'Commit: %s\n\n' "${RELEASE_COMMIT}"
            printf 'Publication: blocked.\n\n'
            printf 'CI gate: %s.\n\n' "${RELEASE_CI_GATE}"
            printf 'Release readiness: %s (%s).\n\n' "${release_readiness_status}" "${release_readiness_blocking_reason}"
            printf 'Dry-run artifacts: Linux x64 policy-core tarball and Windows x64 shim zip.\n\n'
            printf 'Compatibility matrix status counts: supported=%s, partial=%s, planned=%s, unsupported=%s, total=%s.\n\n' \
              "${compatibility_supported_count}" \
              "${compatibility_partial_count}" \
              "${compatibility_planned_count}" \
              "${compatibility_unsupported_count}" \
              "${compatibility_total_count}"
            printf 'Compatibility scope: alpha policy core, runner, bindings, and docs.\n\n'
            printf 'Known gaps: no v1.0.0 stable release claim, no tag publication, no\n'
            printf 'signing/notarization, no platform certificate lifecycle, no production\n'
            printf 'JavaScript runtime, and no platform app-store release assets.\n\n'
            printf 'Manual intervention: pending markers in docs/manual-intervention.md\n'
            printf 'remain blocking for public release publication.\n\n'
            printf 'Rollback path: discard this workflow artifact; do not create or move a\n'
            printf 'public release tag from a dry-run artifact.\n'
          } > "${release_notes_path}"

          {
            printf 'release_version=%s\n' "${RELEASE_VERSION}"
            printf 'release_kind=%s\n' "${RELEASE_KIND}"
            printf 'release_commit=%s\n' "${RELEASE_COMMIT}"
            printf 'ci_run_id=%s\n' "${GITHUB_RUN_ID}"
            printf 'ci_run_url=%s/%s/actions/runs/%s\n' "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}"
            printf 'ci_run_conclusion=success\n'
            printf 'artifact_name=%s\n' "${artifact_name}"
            printf 'artifact_path=%s\n' "${artifact_path}"
            printf 'artifact_sha256=%s\n' "${artifact_sha256}"
            printf 'artifact_sha256_file=%s\n' "${artifact_sha256_file}"
            printf 'windows_artifact_name=%s\n' "${windows_artifact_name}"
            printf 'windows_artifact_path=%s\n' "${windows_artifact_path}"
            printf 'windows_artifact_sha256=%s\n' "${windows_artifact_sha256}"
            printf 'windows_artifact_sha256_file=%s\n' "${windows_artifact_sha256_file}"
            printf 'manifest_name=%s\n' "${manifest_name}"
            printf 'manifest_path=%s\n' "${manifest_path}"
            printf 'manifest_sha256=%s\n' "${manifest_sha256}"
            printf 'manifest_sha256_file=%s\n' "${manifest_sha256_file}"
            printf 'release_notes_path=%s\n' "${release_notes_path}"
            printf 'manual_intervention_status=pending-items-block-publication\n'
            printf 'release_readiness_status=%s\n' "${release_readiness_status}"
            printf 'release_readiness_blocking_reason=%s\n' "${release_readiness_blocking_reason}"
            printf 'publish_eligibility_status=blocked\n'
            printf 'publish_blocking_reason=dry-run-does-not-publish\n'
            printf 'compatibility_supported_count=%s\n' "${compatibility_supported_count}"
            printf 'compatibility_partial_count=%s\n' "${compatibility_partial_count}"
            printf 'compatibility_planned_count=%s\n' "${compatibility_planned_count}"
            printf 'compatibility_unsupported_count=%s\n' "${compatibility_unsupported_count}"
            printf 'compatibility_total_count=%s\n' "${compatibility_total_count}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate dry-run metadata
        shell: bash
        run: |
          set -euo pipefail
          test -s "${{ steps.metadata.outputs.artifact_path }}"
          test -s "${{ steps.metadata.outputs.artifact_sha256_file }}"
          test -s "${{ steps.metadata.outputs.windows_artifact_path }}"
          test -s "${{ steps.metadata.outputs.windows_artifact_sha256_file }}"
          test -s "${{ steps.metadata.outputs.manifest_path }}"
          test -s "${{ steps.metadata.outputs.manifest_sha256_file }}"
          test -s "${{ steps.metadata.outputs.release_notes_path }}"
          grep -Eq "^[0-9a-f]{64}  ${{ steps.metadata.outputs.artifact_name }}$" "${{ steps.metadata.outputs.artifact_sha256_file }}"
          grep -Eq "^[0-9a-f]{64}  ${{ steps.metadata.outputs.windows_artifact_name }}$" "${{ steps.metadata.outputs.windows_artifact_sha256_file }}"
          grep -Eq "^[0-9a-f]{64}  ${{ steps.metadata.outputs.manifest_name }}$" "${{ steps.metadata.outputs.manifest_sha256_file }}"
          grep -q "\"release_version\": \"${RELEASE_VERSION}\"" "${{ steps.metadata.outputs.manifest_path }}"
          grep -q "\"release_commit\": \"${RELEASE_COMMIT}\"" "${{ steps.metadata.outputs.manifest_path }}"
          grep -q "\"publication\": \"blocked\"" "${{ steps.metadata.outputs.manifest_path }}"
          grep -q "\"release_readiness_status\": \"${{ steps.readiness.outputs.release_readiness_status }}\"" "${{ steps.metadata.outputs.manifest_path }}"
          grep -q "\"compatibility_total_count\": ${{ steps.compatibility.outputs.compatibility_total_count }}" "${{ steps.metadata.outputs.manifest_path }}"
          grep -q "\"platform\": \"linux-x64\"" "${{ steps.metadata.outputs.manifest_path }}"
          grep -q "\"platform\": \"windows-x64\"" "${{ steps.metadata.outputs.manifest_path }}"
          grep -q "Publication: blocked" "${{ steps.metadata.outputs.release_notes_path }}"
          grep -q "Release readiness:" "${{ steps.metadata.outputs.release_notes_path }}"
          grep -q "Dry-run artifacts:" "${{ steps.metadata.outputs.release_notes_path }}"
          grep -q "Compatibility matrix status counts:" "${{ steps.metadata.outputs.release_notes_path }}"
          grep -q "Rollback path:" "${{ steps.metadata.outputs.release_notes_path }}"

      - name: Write release dry-run summary
        shell: bash
        run: |
          {
            printf '## Release Dry Run\n\n'
            printf '| Field | Value |\n'
            printf '| --- | --- |\n'
            printf '| release_version | `%s` |\n' "${{ steps.metadata.outputs.release_version }}"
            printf '| release_kind | `%s` |\n' "${{ steps.metadata.outputs.release_kind }}"
            printf '| release_commit | `%s` |\n' "${{ steps.metadata.outputs.release_commit }}"
            printf '| ci_run_id | `%s` |\n' "${{ steps.metadata.outputs.ci_run_id }}"
            printf '| ci_run_conclusion | `%s` |\n' "${{ steps.metadata.outputs.ci_run_conclusion }}"
            printf '| artifact_name | `%s` |\n' "${{ steps.metadata.outputs.artifact_name }}"
            printf '| artifact_sha256 | `%s` |\n' "${{ steps.metadata.outputs.artifact_sha256 }}"
            printf '| windows_artifact_name | `%s` |\n' "${{ steps.metadata.outputs.windows_artifact_name }}"
            printf '| windows_artifact_sha256 | `%s` |\n' "${{ steps.metadata.outputs.windows_artifact_sha256 }}"
            printf '| manifest_name | `%s` |\n' "${{ steps.metadata.outputs.manifest_name }}"
            printf '| manifest_sha256 | `%s` |\n' "${{ steps.metadata.outputs.manifest_sha256 }}"
            printf '| manual_intervention_status | `%s` |\n' "${{ steps.metadata.outputs.manual_intervention_status }}"
            printf '| release_readiness_status | `%s` |\n' "${{ steps.metadata.outputs.release_readiness_status }}"
            printf '| release_readiness_blocking_reason | `%s` |\n' "${{ steps.metadata.outputs.release_readiness_blocking_reason }}"
            printf '| publish_eligibility_status | `%s` |\n' "${{ steps.metadata.outputs.publish_eligibility_status }}"
            printf '| publish_blocking_reason | `%s` |\n' "${{ steps.metadata.outputs.publish_blocking_reason }}"
            printf '| compatibility_supported_count | `%s` |\n' "${{ steps.metadata.outputs.compatibility_supported_count }}"
            printf '| compatibility_partial_count | `%s` |\n' "${{ steps.metadata.outputs.compatibility_partial_count }}"
            printf '| compatibility_planned_count | `%s` |\n' "${{ steps.metadata.outputs.compatibility_planned_count }}"
            printf '| compatibility_unsupported_count | `%s` |\n' "${{ steps.metadata.outputs.compatibility_unsupported_count }}"
            printf '| compatibility_total_count | `%s` |\n' "${{ steps.metadata.outputs.compatibility_total_count }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - uses: actions/upload-artifact@v7
        with:
          name: anixops-mitm-release-dry-run
          path: |
            mitm_anixops/${{ steps.metadata.outputs.artifact_path }}
            mitm_anixops/${{ steps.metadata.outputs.artifact_sha256_file }}
            mitm_anixops/${{ steps.metadata.outputs.windows_artifact_path }}
            mitm_anixops/${{ steps.metadata.outputs.windows_artifact_sha256_file }}
            mitm_anixops/${{ steps.metadata.outputs.manifest_path }}
            mitm_anixops/${{ steps.metadata.outputs.manifest_sha256_file }}
            mitm_anixops/${{ steps.metadata.outputs.release_notes_path }}

  package-windows:
    runs-on: windows-latest
    needs:
      - release-policy
    env:
      RELEASE_VERSION: ${{ needs.release-policy.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-libsystre
            zip
      - name: Build Windows dry-run binary
        shell: pwsh
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $MsysRoot = $env:MSYS2_LOCATION
          $env:PATH = "$(Join-Path $MsysRoot 'ucrt64\bin');$(Join-Path $MsysRoot 'usr\bin');$env:PATH"
          cd mitm_anixops
          .\examples\windows-bilibili\build-windows.ps1
      - name: Package Windows dry-run artifact
        shell: pwsh
        run: |
          $VersionNoV = $env:RELEASE_VERSION
          if ($VersionNoV.StartsWith("v")) {
            $VersionNoV = $VersionNoV.Substring(1)
          }
          $PackageName = "anixops-mitm-release-dry-run-windows-x64-$VersionNoV"
          $PackageRoot = Join-Path "dist" $PackageName
          New-Item -ItemType Directory -Force (Join-Path $PackageRoot "build") | Out-Null
          Copy-Item mitm_anixops\build\anixops-mitm.exe (Join-Path $PackageRoot "build\")
          Copy-Item -Recurse mitm_anixops\examples $PackageRoot
          Copy-Item mitm_anixops\README.md $PackageRoot
          $ZipPath = Join-Path "dist" "$PackageName.zip"
          Compress-Archive -Path $PackageRoot -DestinationPath $ZipPath -Force
          $Hash = (Get-FileHash -Algorithm SHA256 $ZipPath).Hash.ToLowerInvariant()
          $ZipName = Split-Path -Leaf $ZipPath
          [System.IO.File]::WriteAllText("$ZipPath.sha256", "$Hash  $ZipName`n", [System.Text.Encoding]::ASCII)
      - uses: actions/upload-artifact@v7
        with:
          name: anixops-mitm-release-dry-run-windows
          path: |
            dist/anixops-mitm-release-dry-run-windows-x64-*.zip
            dist/anixops-mitm-release-dry-run-windows-x64-*.zip.sha256
